# Sevalla / Nixpacks configuration for anticall-server

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# Rebuild native module for container's Linux env (avoids "invalid ELF header" from wrong-platform binaries)
cmds = ["rm -rf node_modules/better-sqlite3/build", "npm rebuild better-sqlite3", "npm run build"]

[start]
cmd = "npm start"
