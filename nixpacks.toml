# Sevalla / Nixpacks configuration for anticall-server

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# Build better-sqlite3 from source for container's Linux (avoids "invalid ELF header")
cmds = ["cd node_modules/better-sqlite3 && node-gyp rebuild --release", "npm run build"]

[start]
cmd = "npm start"
